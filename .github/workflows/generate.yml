name: Grow question bank (AI)

# Automatically grows the curated GK / English / Computer / GS banks every day
# using the free AI providers, in priority order (CGL Tier 2 first, then Tier 1,
# then the other exams). Fully resumable — each run continues where the last
# left off and stops cleanly when the daily AI quota is used up.
#
# Required repo secrets: DATABASE_URL (set), GEMINI_API_KEY. Optional: GROQ_API_KEY
# (adds a free fallback provider for extra daily throughput).
on:
  schedule:
    # Times chosen in IST (UTC+5:30), with odd minutes for scheduler reliability.
    - cron: "31 23 * * *" # 23:31 UTC = ~5:00 AM IST  (main run)
    - cron: "31 14 * * *" # 14:31 UTC = ~8:00 PM IST  (evening run — only adds more
    #                       if the daily AI quota isn't already used up)
  workflow_dispatch:
    inputs:
      plan:
        description: "Override PLAN (exam:section:cap,comma-separated)"
        required: false

permissions:
  contents: read

concurrency:
  group: grow-question-bank
  cancel-in-progress: false

jobs:
  grow:
    runs-on: ubuntu-latest
    timeout-minutes: 50
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DIRECT_URL: ${{ secrets.DATABASE_URL }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      PLAN: >-
        ${{ github.event.inputs.plan ||
        'ssc-cgl-tier1:quant:3000,ssc-cgl-tier1:reasoning:3000,ssc-cgl-tier2:math:2000,ssc-cgl-tier2:reasoning:2000,ibps-po-prelims:quant:1500,ibps-po-prelims:reasoning:1500,rrb-ntpc-cbt1:maths:1500,rrb-ntpc-cbt1:reasoning:1500,ssc-chsl-tier1:quant:1500,ssc-chsl-tier1:general-intelligence:1500,ssc-cgl-tier1:english:1000,ssc-cgl-tier2:english:600,ibps-po-prelims:english:600,ssc-chsl-tier1:english:600,ssc-cgl-tier1:general-awareness:500,ssc-cgl-tier2:computer:500,upsc-prelims-gs1:general-studies:500' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npx prisma generate
      - name: Generate questions (priority plan)
        run: npx tsx scripts/grow-direct.mts
