services:
  postgres:
    image: postgres:16-alpine
    container_name: examprep-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: examuser
      POSTGRES_PASSWORD: exampass
      POSTGRES_DB: examprep
    ports:
      - "5432:5432"
    volumes:
      - examprep_pgdata:/var/lib/postgresql/data

volumes:
  examprep_pgdata:
